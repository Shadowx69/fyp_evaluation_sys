name: Run Selenium Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo
        ports:
          - 27017:27017

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4  # Updated to v4

      - name: Setup Node
        uses: actions/setup-node@v4  # Updated to v4
        with:
          node-version: 18

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Start Backend
        run: |
          cd backend
          npm start &
      
      - name: Start Frontend
        run: |
          cd frontend
          npm start &

      - name: Wait for App to Load
        run: sleep 10

      - name: Install Test Dependencies
        run: |
          cd tests
          npm install  # If tests have their own package.json
        # OR if tests use the backend's node_modules:
        # run: npm install  # If tests are at root with package.json

      - name: Run Tests
        run: node tests/runTests.js