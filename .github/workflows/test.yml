name: Run Selenium Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo
        ports:
          - 27017:27017

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      # Install wait-on
      - name: Install wait-on
        run: npm install -g wait-on

      - name: Install Server Dependencies
        run: |
          cd server
          npm install

      - name: Install Client Dependencies
        run: |
          cd client
          npm install

      - name: Start Server
        run: |
          cd server
          npm start &

      - name: Start Client
        run: |
          cd client
          npm start &

      # ✅ PROPER WAIT (IMPORTANT)
      - name: Wait for Backend
        run: wait-on http://localhost:5000

      - name: Wait for Frontend
        run: wait-on http://localhost:3000

      - name: Install Test Dependencies
        run: |
          cd tests
          npm install

      - name: Run Tests
        run: |
          cd tests
          node runTests.js