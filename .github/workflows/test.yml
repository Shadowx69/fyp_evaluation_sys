name: Run Selenium Tests

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json
            tests/package-lock.json

      - name: Install wait-on globally
        run: npm install -g wait-on

      - name: Install Server Dependencies
        working-directory: ./server
        run: npm ci

      - name: Install Client Dependencies
        working-directory: ./client
        run: npm ci

      - name: Install Test Dependencies
        working-directory: ./tests
        run: npm ci

      - name: Create .env file
        working-directory: ./server
        run: |
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "PORT=5000" >> .env

      - name: Start Server in Background
        working-directory: ./server
        run: npm start &
        env:
          NODE_ENV: test

      - name: Wait for Server to be Ready
        run: wait-on http://localhost:5000 --timeout 60000

      - name: Start Client in Background
        working-directory: ./client
        run: npm start &
        env:
          CI: false
          BROWSER: none

      - name: Wait for Client to be Ready
        run: wait-on http://localhost:3000 --timeout 120000

      - name: Run Selenium Tests
        working-directory: ./tests
        run: node runTests.js

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/*.log
          if-no-files-found: ignore
